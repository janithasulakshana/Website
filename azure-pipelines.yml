trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  dockerRegistryServiceConnection: dockerhub-service-connection
  kubernetesServiceConnection: k8s-service-connection
  namespace: default
  backendImageRepository: janithasulakshana/website-backend
  frontendImageRepository: janithasulakshana/website-frontend
  tag: $(Build.BuildId)

stages:
  - stage: Build
    displayName: Build and Push Images
    jobs:
      - job: BuildAndPush
        displayName: Build and push Docker images
        steps:
          - checkout: self

          - task: Docker@2
            displayName: Build and push backend image
            inputs:
              command: buildAndPush
              containerRegistry: $(dockerRegistryServiceConnection)
              repository: $(backendImageRepository)
              dockerfile: Dockerfile
              buildContext: .
              tags: |
                $(tag)
                latest

          - task: Docker@2
            displayName: Build and push frontend image
            inputs:
              command: buildAndPush
              containerRegistry: $(dockerRegistryServiceConnection)
              repository: $(frontendImageRepository)
              dockerfile: Dockerfile.frontend
              buildContext: .
              tags: |
                $(tag)
                latest

  - stage: Deploy
    displayName: Deploy to Kubernetes
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployToK8s
        displayName: Apply manifests and roll out
        environment: production
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: KubernetesManifest@1
                  displayName: Create or update image pull secret
                  inputs:
                    action: createSecret
                    kubernetesServiceConnection: $(kubernetesServiceConnection)
                    namespace: $(namespace)
                    secretType: dockerRegistry
                    secretName: regcred
                    dockerRegistryEndpoint: $(dockerRegistryServiceConnection)

                - task: KubernetesManifest@1
                  displayName: Deploy backend and frontend
                  inputs:
                    action: deploy
                    kubernetesServiceConnection: $(kubernetesServiceConnection)
                    namespace: $(namespace)
                    manifests: |
                      secret.yaml
                      deployment-backend.yaml
                      deployment-frontend.yaml
                    imagePullSecrets: |
                      regcred
                    containers: |
                      $(backendImageRepository):$(tag)
                      $(frontendImageRepository):$(tag)