global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Backend application metrics
  - job_name: 'website-backend'
    static_configs:
      - targets: ['backend:5000']
    metrics_path: '/metrics'

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
